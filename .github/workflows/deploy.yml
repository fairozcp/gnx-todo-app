name: Build Push Validate

on:
  push:
    branches:
      - main

env:
  FRONTEND_IMAGE: fairozcp/gnx-frontend
  BACKEND_IMAGE: fairozcp/gnx-backend

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build frontend image
        run: docker build -t $FRONTEND_IMAGE:${GITHUB_SHA} ./frontend

      - name: Build backend image
        run: docker build -t $BACKEND_IMAGE:${GITHUB_SHA} ./backend

  push:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Docker login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and push frontend image
        run: |
          docker build -t $FRONTEND_IMAGE:${GITHUB_SHA} ./frontend
          docker push $FRONTEND_IMAGE:${GITHUB_SHA}

      - name: Build and push backend image
        run: |
          docker build -t $BACKEND_IMAGE:${GITHUB_SHA} ./backend
          docker push $BACKEND_IMAGE:${GITHUB_SHA}

  validate:
    runs-on: ubuntu-latest
    needs: push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Kubernetes manifests
        run: |
          kubectl version --client
          kubectl apply --dry-run=client --validate=false -f k8s/namespace.yaml
          kubectl apply --dry-run=client --validate=false -f k8s/secret.yaml
          kubectl apply --dry-run=client --validate=false -f k8s/postgres.yaml
          kubectl apply --dry-run=client --validate=false -f k8s/backend.yaml
          kubectl apply --dry-run=client --validate=false -f k8s/frontend.yaml
          kubectl apply --dry-run=client --validate=false -f k8s/ingress.yaml
          kubectl apply --dry-run=client --validate=false -f k8s/grafana-ingress.yaml