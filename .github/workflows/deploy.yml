name: Build Push Deploy

on:
  push:
    branches:
      - main

env:
  FRONTEND_IMAGE: fairozcp/gnx-frontend
  BACKEND_IMAGE: fairozcp/gnx-backend

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build frontend image
        run: docker build -t $FRONTEND_IMAGE:${GITHUB_SHA} ./frontend

      - name: Build backend image
        run: docker build -t $BACKEND_IMAGE:${GITHUB_SHA} ./backend

  push:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Docker login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and push frontend image
        run: |
          docker build -t $FRONTEND_IMAGE:${GITHUB_SHA} ./frontend
          docker push $FRONTEND_IMAGE:${GITHUB_SHA}

      - name: Build and push backend image
        run: |
          docker build -t $BACKEND_IMAGE:${GITHUB_SHA} ./backend
          docker push $BACKEND_IMAGE:${GITHUB_SHA}

  deploy:
    runs-on: ubuntu-latest
    needs: push

    steps:
      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy to Kubernetes
        run: |
          kubectl set image deployment/gnx-frontend gnx-frontend=$FRONTEND_IMAGE:${GITHUB_SHA} -n gnx-app
          kubectl set image deployment/gnx-backend gnx-backend=$BACKEND_IMAGE:${GITHUB_SHA} -n gnx-app
          kubectl rollout status deployment/gnx-frontend -n gnx-app
          kubectl rollout status deployment/gnx-backend -n gnx-app