name: Build Push Validate

on:
  push:
    branches:
      - main

env:
  FRONTEND_IMAGE: fairozcp/gnx-frontend
  BACKEND_IMAGE: fairozcp/gnx-backend

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build frontend image
        run: docker build -t $FRONTEND_IMAGE:${GITHUB_SHA} ./frontend

      - name: Build backend image
        run: docker build -t $BACKEND_IMAGE:${GITHUB_SHA} ./backend

  push:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Docker login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and push frontend image
        run: |
          docker build -t $FRONTEND_IMAGE:${GITHUB_SHA} ./frontend
          docker push $FRONTEND_IMAGE:${GITHUB_SHA}

      - name: Build and push backend image
        run: |
          docker build -t $BACKEND_IMAGE:${GITHUB_SHA} ./backend
          docker push $BACKEND_IMAGE:${GITHUB_SHA}

  validate:
    runs-on: ubuntu-latest
    needs: push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Kubernetes YAML files
        run: |
          python - <<'PY'
          import yaml
          from pathlib import Path

          files = [
              "k8s/namespace.yaml",
              "k8s/secret.yaml",
              "k8s/postgres.yaml",
              "k8s/backend.yaml",
              "k8s/frontend.yaml",
              "k8s/ingress.yaml",
              "k8s/grafana-ingress.yaml",
          ]

          for file in files:
              path = Path(file)
              if not path.exists():
                  raise SystemExit(f"Missing file: {file}")

              with path.open("r", encoding="utf-8") as f:
                  docs = [doc for doc in yaml.safe_load_all(f) if doc]

              if not docs:
                  raise SystemExit(f"No YAML documents found in {file}")

              for doc in docs:
                  if "apiVersion" not in doc:
                      raise SystemExit(f"Missing apiVersion in {file}")
                  if "kind" not in doc:
                      raise SystemExit(f"Missing kind in {file}")
                  if "metadata" not in doc:
                      raise SystemExit(f"Missing metadata in {file}")

              print(f"Validated {file}")

          print("All Kubernetes YAML files are valid.")
          PY
  deploy:
    runs-on: self-hosted
    needs: validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Kubernetes access
        shell: powershell
        run: |
          kubectl get nodes
          kubectl get pods -n gnx-app

      - name: Deploy frontend and backend images
        shell: powershell
        run: |
          kubectl set image deployment/gnx-frontend gnx-frontend=${{ env.FRONTEND_IMAGE }}:${{ github.sha }} -n gnx-app
          kubectl set image deployment/gnx-backend gnx-backend=${{ env.BACKEND_IMAGE }}:${{ github.sha }} -n gnx-app

      - name: Wait for rollout
        shell: powershell
        run: |
          kubectl rollout status deployment/gnx-frontend -n gnx-app
          kubectl rollout status deployment/gnx-backend -n gnx-app

      - name: Show final Kubernetes status
        shell: powershell
        run: |
          kubectl get pods -n gnx-app
          kubectl get all -n gnx-app